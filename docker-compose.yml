services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: researcherx
      POSTGRES_PASSWORD: researcherx
      POSTGRES_DB: researcherx
    # Host port intentionally not published — your local postgres owns 5432.
    # The backend reaches db via the docker network on the default port.
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researcherx"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://researcherx:researcherx@db:5432/researcherx
    # Reach host-run Ollama at host.docker.internal:11434. Docker Desktop
    # (macOS/Windows) provides the name natively; host-gateway makes it work
    # on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  # Opt-in containerized Ollama: docker compose --profile ollama up
  # On macOS this is CPU-only (no GPU passthrough) — prefer host-run Ollama.
  # Useful on Linux hosts with GPU or when installing Ollama on the host is
  # not an option. Set LLM_BASE_URL=http://ollama:11434/v1 in .env to use it.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU on Linux (uncomment with nvidia-container-toolkit installed):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  db_data:
  ollama_models:
