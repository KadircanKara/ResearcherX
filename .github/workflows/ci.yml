# CI stub (deployment Phase 0) — backend lint only.
# Phase 1 expands this with: backend pytest job; frontend npm ci + lint +
# typecheck + build (node 22). Keep this green — it gates every phase after.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin to the minor version verified locally so format rules don't drift.
      - run: pip install "ruff~=0.12.0"
      - run: ruff check .
      - run: ruff format --check .
